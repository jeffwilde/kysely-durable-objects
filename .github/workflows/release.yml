name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm build
      - run: pnpm test
      - name: Verify tag matches package version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          if [ "$tag" != "$pkg" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $pkg" >&2
            exit 1
          fi
      # Trusted Publishing via OIDC — no NPM_TOKEN needed.
      # Uses npm CLI directly because pnpm doesn't yet do the OIDC handshake
      # (https://github.com/pnpm/pnpm/issues/9812). npm 11.5.1+ exchanges the
      # GitHub id-token for a registry credential automatically.
      - run: npx npm@latest publish --access public --provenance
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
